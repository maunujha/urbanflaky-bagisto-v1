# Urbanflaky — canonical production nginx vhost (HTTP base).
#
# This is the file you COPY onto a fresh server. It listens on :80 only; running
#   sudo certbot --nginx -d urbanflaky.in -d www.urbanflaky.in --redirect
# rewrites it in place to add the `listen 443 ssl http2` block + the 80->443 redirect.
#
# Deploy:
#   sudo cp deploy/nginx/urbanflaky.conf /etc/nginx/sites-available/urbanflaky.conf
#   sudo ln -sf /etc/nginx/sites-available/urbanflaky.conf /etc/nginx/sites-enabled/urbanflaky.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d urbanflaky.in -d www.urbanflaky.in --redirect
#
# NOTE on the `location ^~ /cache/` rule below: it is NOT optional. Product images are
# rendered by Bagisto's on-the-fly resizer (Webkul\ImageCache) at
#   /cache/{size}/product/<id>/<file>.webp  (and a .jpg fallback)
# These are DYNAMIC Laravel routes, not files on disk. Because the URLs end in .webp/.jpg
# they are otherwise captured by the static-asset regex below and 404'd before reaching
# PHP -- so every product image vanishes even though the /storage/... originals load fine.
# `^~` gives this prefix location priority over the regex location regardless of order.
# (Local Laragon has no static-asset regex, so everything falls through to index.php and
#  this rule isn't needed there -- only hardened/static-serving nginx needs it.)

server {
    listen 80;
    listen [::]:80;
    server_name urbanflaky.in www.urbanflaky.in;
    root /var/www/urbanflaky/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20m;
    autoindex off;                           # dev/Laragon has this ON — never in prod

    # Bagisto on-the-fly image resizer — MUST come before the static-asset regex.
    location ^~ /cache/ {
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Hashed Vite assets + /storage originals (real files only — dynamic /cache/ handled above).
    location ~* \.(css|js|mjs|woff2?|ttf|eot|jpg|jpeg|png|webp|gif|svg|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block hidden files (.env, .git, .ht*) but allow the ACME challenge.
    location ~ /\.(?!well-known).* { deny all; }

    access_log /var/log/nginx/urbanflaky.access.log;
    error_log  /var/log/nginx/urbanflaky.error.log;
}
